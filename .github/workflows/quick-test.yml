name: Unit Tests

on:
  push:
    branches: []
  workflow_dispatch:

jobs:
  Windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: dotnet build -c Release
      
      - name: Unit Test
        run: dotnet test -c Release
        
  Ubuntu:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: dotnet build -c Release
      
      - name: Unit Test
        run: dotnet test -c Release